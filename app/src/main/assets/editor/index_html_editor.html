<!DOCTYPE html>
<html lang="ur">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>UrduWriter Editor</title>
    <style>
        /* Modern Workspace Setup - Screen & Print Synchronization */
        :root {
            --page-width: 210mm;
            --page-height: 297mm;
            --page-margin: 0.75in;
            --page-margin-top: 0.75in;
            --page-margin-bottom: 0.75in;
            --guideline-offset: 0px;
            --printable-height: calc(var(--page-height) - var(--page-margin-top) - var(--page-margin-bottom) + var(--guideline-offset));
            --guideline-color: #ff4d4d;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            direction: rtl;
            font-family: "Jameel_noori_nastaleeq", "Jameel Noori Nastaleeq", "Sakkal Majalla", "Adobe Arabic", serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            background: #E9EEF2;
            min-height: 100vh;
        }

        /* Center page on screen using robust block centering */
        body {
            display: block;
            text-align: center;
            min-width: fit-content;
        }

        #page-container {
            padding: 40px 20px;
            display: inline-block;
            text-align: right;
        }

        #editor {
            width: var(--page-width);
            min-height: var(--page-height);

            /* The margin MUST be inside the page box as padding to match print perfectly */
            padding: var(--page-margin);
            background: white;
            box-sizing: border-box;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.15);
            border-radius: 2px;

            direction: rtl;
            font-family: inherit;
            font-size: 22px !important;
            line-height: 1.8;
            outline: none;
            overflow-wrap: break-word;
            word-wrap: break-word;
            text-align: right;
            text-justify: inter-word;

            /* Force exact rendering */
            white-space: pre-wrap;
            word-break: normal;

            /* Visual page break guidelines - repeating exactly at printable content boundaries */
            background-image: linear-gradient(to bottom, 
                transparent 0px, 
                transparent calc(var(--printable-height) - 1.5px), 
                var(--guideline-color) calc(var(--printable-height) - 1.5px), 
                var(--guideline-color) var(--printable-height)
            );
            background-size: 100% var(--printable-height);
            background-position: 0 var(--page-margin-top);
            background-repeat: repeat-y;
        }

        /* Ensure all block elements created inside editor have explicit RTL layout and alignment */
        #editor > div,
        #editor > p,
        #editor > blockquote,
        #editor > li {
            direction: rtl;
            text-align: right;
            margin: 0 !important;
            padding: 0 !important;
        }

        /* Optimize line height of empty paragraphs/divs (when user presses Enter) to match normal font heights and look neat */
        #editor div:has(> br:only-child),
        #editor p:has(> br:only-child),
        #editor div:empty,
        #editor p:empty {
            line-height: 1.0 !important;
        }

        u {
            text-underline-offset: 4px;
        }

        li {
            font-size: inherit;
        }

        @media print {
            @page {
                size: A4 portrait;
                margin: 0.75in;
            }

            html,
            body {
                background: white !important;
                width: auto !important;
                height: auto !important;
                display: block !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            #page-container {
                padding: 0 !important;
                margin: 0 !important;
                display: block !important;
                width: 100% !important;
            }

            #editor {
                width: 100% !important;
                min-height: 0 !important;
                padding: 0 !important;
                margin: 0 !important;
                box-shadow: none !important;
                border: none !important;
                background: white !important;
                background-image: none !important; /* Hide guidelines in print */

                /* Hide cursor in PDF */
                caret-color: transparent !important;
                outline: none !important;

                /* Pagination controls */
                page-break-inside: auto;
            }

            /* Allow elements to split naturally on page breaks without restrictions */
            #editor p,
            #editor div,
            #editor li,
            #editor blockquote,
            #editor h1,
            #editor h2,
            #editor h3,
            #editor h4,
            #editor h5,
            #editor h6 {
                orphans: 1 !important;
                widows: 1 !important;
                page-break-inside: auto !important;
                break-inside: auto !important;
            }
        }
    </style>
</head>

<body>
    <div id="page-container">
        <div id="editor" contenteditable="true" dir="rtl"></div>
    </div>

    <script>
        const editor = document.getElementById('editor');

        // Enable CSS mode for commands
        document.execCommand('styleWithCSS', false, true);

        // Intercept Tab key to insert a real tab character instead of shifting focus
        editor.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                document.execCommand('insertText', false, '\t');
            }
        });

        let savedRange = null;

        document.addEventListener('selectionchange', () => {
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                const range = sel.getRangeAt(0);
                if (editor.contains(range.commonAncestorContainer)) {
                    savedRange = range.cloneRange();
                }
            }
        });

        function restoreSelection() {
            if (savedRange) {
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(savedRange);
            }
        }

        function setDefaultFontSize(size) {
            editor.style.fontSize = size;
        }

        function setPageSettings(pageSize, marginValue, showLines, guidelineOffset, isLandscape, customWidth, customHeight) {
            const root = document.documentElement;
            
            let widthVal = 210;
            let heightVal = 297;
            let unit = 'mm';
            let printSizeStr = 'A4';
            
            if (pageSize === 'Letter') {
                widthVal = 215.9;
                heightVal = 279.4;
                printSizeStr = 'letter';
            } else if (pageSize === 'Legal') {
                widthVal = 215.9;
                heightVal = 355.6;
                printSizeStr = 'legal';
            } else if (pageSize === 'A3') {
                widthVal = 297;
                heightVal = 420;
                printSizeStr = 'A3';
            } else if (pageSize === 'A5') {
                widthVal = 148;
                heightVal = 210;
                printSizeStr = 'A5';
            } else if (pageSize === 'Executive') {
                widthVal = 184.1;
                heightVal = 266.7;
                printSizeStr = 'executive';
            } else if (pageSize === 'Custom') {
                unit = 'in';
                widthVal = parseFloat(customWidth) || 8.27;
                heightVal = parseFloat(customHeight) || 11.69;
                let printWidth = isLandscape ? heightVal : widthVal;
                let printHeight = isLandscape ? widthVal : heightVal;
                printSizeStr = `${printWidth}in ${printHeight}in`;
            }

            let width = isLandscape ? (heightVal + unit) : (widthVal + unit);
            let height = isLandscape ? (widthVal + unit) : (heightVal + unit);
            
            if (pageSize !== 'Custom') {
                let printOrientation = isLandscape ? 'landscape' : 'portrait';
                printSizeStr = printSizeStr + ' ' + printOrientation;
            }
            
            // Helper to compensate for Android print bottom margin bias
            function adjustBottomMarginForPrint(marginStr) {
                if (!marginStr) return '0.75in';
                const val = parseFloat(marginStr);
                if (isNaN(val) || val <= 0) return marginStr;
                
                if (marginStr.endsWith('in')) {
                    return Math.max(0, val - 0.12).toFixed(2) + 'in';
                } else if (marginStr.endsWith('mm')) {
                    return Math.max(0, val - 3.0).toFixed(2) + 'mm';
                } else if (marginStr.endsWith('px')) {
                    return Math.max(0, val - 12).toFixed(2) + 'px';
                }
                return marginStr;
            }

            // Parse individual margins for print and screen
            const parts = marginValue.trim().split(/\s+/);
            let marginTop = '0.75in';
            let marginRight = '0.75in';
            let marginBottom = '0.75in';
            let marginLeft = '0.75in';
            
            if (parts.length === 1) {
                marginTop = marginRight = marginBottom = marginLeft = parts[0];
            } else if (parts.length === 2) {
                marginTop = marginBottom = parts[0];
                marginRight = marginLeft = parts[1];
            } else if (parts.length === 3) {
                marginTop = parts[0];
                marginRight = marginLeft = parts[1];
                marginBottom = parts[2];
            } else if (parts.length >= 4) {
                marginTop = parts[0];
                marginRight = parts[1];
                marginBottom = parts[2];
                marginLeft = parts[3];
            }

            const adjustedBottomPrint = adjustBottomMarginForPrint(marginBottom);

            root.style.setProperty('--page-width', width);
            root.style.setProperty('--page-height', height);
            root.style.setProperty('--page-margin', marginValue);
            root.style.setProperty('--page-margin-top', marginTop);
            root.style.setProperty('--page-margin-bottom', marginBottom);
            root.style.setProperty('--guideline-offset', (guidelineOffset || 0) + 'px');
            root.style.setProperty('--printable-height', `calc(${height} - ${marginTop} - ${marginBottom} + var(--guideline-offset))`);
            root.style.setProperty('--guideline-color', showLines ? '#ff4d4d' : 'transparent');
            
            let printStyle = document.getElementById('printSettings');
            if (!printStyle) {
                printStyle = document.createElement('style');
                printStyle.id = 'printSettings';
                document.head.appendChild(printStyle);
            }
            printStyle.innerHTML = `
                @media print {
                    @page {
                        size: ${printSizeStr};
                        margin: ${marginTop} ${marginRight} ${adjustedBottomPrint} ${marginLeft};
                    }
                }
            `;
        }

        function getSelectionFontSize() {
            const selection = window.getSelection();
            if (!selection.rangeCount) return 22;
            
            const range = selection.getRangeAt(0);
            let node = range.startContainer;
            if (node.nodeType === Node.TEXT_NODE) {
                node = node.parentNode;
            }
            
            // If node is editor, look at first child inside range
            if (node === editor && range.startOffset < editor.childNodes.length) {
                let child = editor.childNodes[range.startOffset];
                if (child.nodeType === Node.TEXT_NODE) {
                    child = child.parentNode;
                }
                if (child && child.nodeType === Node.ELEMENT_NODE) {
                    node = child;
                }
            }
            
            if (node && node.nodeType === Node.ELEMENT_NODE && (editor === node || editor.contains(node))) {
                const style = window.getComputedStyle(node);
                return parseInt(style.fontSize, 10) || 22;
            }
            return 22;
        }

        function changeFontSize(delta) {
            editor.focus();
            restoreSelection();

            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            const range = selection.getRangeAt(0);
            
            const numericDelta = parseInt(delta, 10);
            
            if (selection.isCollapsed) {
                // Collapsed selection: change size of new text
                const currentSize = getSelectionFontSize();
                let newSize = currentSize + numericDelta;
                if (newSize < 8) newSize = 8;
                if (newSize > 150) newSize = 150;
                applyFontSize(newSize);
                if (window.Android && typeof window.Android.updateCurrentStyle === 'function') {
                    window.Android.updateCurrentStyle(lastReportedFont, newSize + 'px');
                }
                return;
            }

            // Non-collapsed selection: adjust size of elements inside range relatively
            document.execCommand('styleWithCSS', false, false);
            document.execCommand('fontSize', false, '7');

            const fontElements = editor.querySelectorAll("font[size='7']");
            let firstSpan = null;
            let lastSpan = null;

            fontElements.forEach(el => {
                el.removeAttribute("size");
                
                const parentStyle = window.getComputedStyle(el.parentNode);
                const baseOriginalSize = parseInt(parentStyle.fontSize, 10) || 22;
                let baseNewSize = baseOriginalSize + numericDelta;
                if (baseNewSize < 8) baseNewSize = 8;
                if (baseNewSize > 150) baseNewSize = 150;

                // Adjust any inner elements with explicit inline font-size relatively
                const innerElements = el.querySelectorAll('*');
                innerElements.forEach(child => {
                    if (child.style.fontSize) {
                        const childSize = parseInt(child.style.fontSize, 10) || baseOriginalSize;
                        let newChildSize = childSize + numericDelta;
                        if (newChildSize < 8) newChildSize = 8;
                        if (newChildSize > 150) newChildSize = 150;
                        child.style.fontSize = newChildSize + "px";
                    }
                });

                const span = document.createElement('span');
                span.style.fontSize = baseNewSize + "px";
                if (el.style.fontFamily) span.style.fontFamily = el.style.fontFamily;
                if (el.style.color) span.style.color = el.style.color;
                if (el.face) span.style.fontFamily = el.face;
                if (el.color) span.style.color = el.color;

                while (el.firstChild) span.appendChild(el.firstChild);
                el.parentNode.replaceChild(span, el);

                if (!firstSpan) firstSpan = span;
                lastSpan = span;
            });

            if (firstSpan && lastSpan) {
                const range = document.createRange();
                range.setStartBefore(firstSpan);
                range.setEndAfter(lastSpan);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            }

            document.execCommand('styleWithCSS', false, true);

            // Refresh saved selection range
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                savedRange = sel.getRangeAt(0).cloneRange();
            }

            // Report new style to Android based on selection start
            if (window.Android && typeof window.Android.updateCurrentStyle === 'function') {
                const newSize = getSelectionFontSize();
                window.Android.updateCurrentStyle(lastReportedFont, newSize + 'px');
            }
        }

        function execCmd(command, value) {
            editor.focus();
            restoreSelection();
            document.execCommand(command, false, value || null);
            // Refresh saved selection range
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                savedRange = sel.getRangeAt(0).cloneRange();
            }
        }

        function getDocumentHtml() { return editor.innerHTML; }
        function setDocumentHtml(html) { editor.innerHTML = html || ''; }
        function setDocumentHtmlBase64(base64Str) {
            if (!base64Str) {
                editor.innerHTML = '';
                return;
            }
            try {
                const binary = atob(base64Str);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }
                const decoder = new TextDecoder('utf-8');
                editor.innerHTML = decoder.decode(bytes);
            } catch (e) {
                try {
                    editor.innerHTML = decodeURIComponent(escape(atob(base64Str)));
                } catch (err) {
                    editor.innerHTML = atob(base64Str);
                }
            }
        }
        function clearAll() { setDocumentHtml(''); }

        function setListBullet(bulletChar) {
            editor.focus();
            restoreSelection();
            const selection = window.getSelection();
            if (!selection.rangeCount) return;

            let node = selection.anchorNode;
            let li = null;
            let ul = null;

            while (node && node !== editor) {
                if (node.nodeName === 'LI') li = node;
                if (node.nodeName === 'UL') {
                    ul = node;
                    break;
                }
                node = node.parentNode;
            }

            if (li || ul) {
                const target = li || ul;
                const standardTypes = {
                    '•': 'disc',
                    '◦': 'circle',
                    '▪': 'square'
                };
                if (standardTypes[bulletChar]) {
                    target.style.listStyleType = standardTypes[bulletChar];
                } else {
                    target.style.listStyleType = `"${bulletChar} "`;
                }
            } else {
                // Not in a list, create one and then apply the bullet
                document.execCommand('insertUnorderedList');
                setTimeout(() => setListBullet(bulletChar), 100);
            }
        }

        // --- Font Size Solution ---
        function applyFontSize(size) {
            editor.focus();
            restoreSelection();
            const selection = window.getSelection();
            if (!selection.rangeCount) return;

            if (selection.isCollapsed) {
                // No text selected, user wants to type in new size
                const range = selection.getRangeAt(0);
                const span = document.createElement('span');
                span.style.fontSize = size + "px";
                span.innerHTML = '&#8203;'; // Zero-width space

                range.insertNode(span);
                range.setStart(span.firstChild, 1);
                range.collapse(true);
                selection.removeAllRanges();
                selection.addRange(range);
                editor.focus();
            } else {
                // Toggle styleWithCSS off temporarily to use <font> tags as reliable markers
                document.execCommand('styleWithCSS', false, false);
                document.execCommand('fontSize', false, '7');

                // Find the marked tags and apply exact pixel size
                const fontElements = editor.querySelectorAll("font[size='7']");
                let firstSpan = null;
                let lastSpan = null;

                fontElements.forEach(el => {
                    el.removeAttribute("size");
                    el.style.fontSize = size + "px";

                    // Convert to span for cleaner HTML
                    const span = document.createElement('span');
                    span.style.fontSize = size + "px";
                    if (el.style.fontFamily) span.style.fontFamily = el.style.fontFamily;
                    if (el.style.color) span.style.color = el.style.color;
                    if (el.face) span.style.fontFamily = el.face;
                    if (el.color) span.style.color = el.color;

                    while (el.firstChild) span.appendChild(el.firstChild);
                    
                    // Clear font-size of any child elements inside selection so they inherit the new size
                    span.querySelectorAll('*').forEach(child => {
                        child.style.fontSize = '';
                        if (!child.getAttribute('style')) {
                            child.removeAttribute('style');
                        }
                    });

                    el.parentNode.replaceChild(span, el);

                    if (!firstSpan) firstSpan = span;
                    lastSpan = span;
                });

                // Re-select the newly formatted spans
                if (firstSpan && lastSpan) {
                    const range = document.createRange();
                    range.setStartBefore(firstSpan);
                    range.setEndAfter(lastSpan);
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(range);
                }

                // Switch back to CSS mode
                document.execCommand('styleWithCSS', false, true);
            }
            // Refresh saved selection range
            const sel = window.getSelection();
            if (sel.rangeCount > 0) {
                savedRange = sel.getRangeAt(0).cloneRange();
            }
        }

        function applyFont(fontName) {
            execCmd('fontName', fontName);
        }

        function applyFontColor(color) {
            execCmd('foreColor', color);
        }

        function insertSymbol(symbol, fontName) {
            editor.focus();
            restoreSelection();
            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            const range = selection.getRangeAt(0);

            // Capture current style to restore it after the symbol
            const currentStyle = getCurrentStyle();
            const originalFont = currentStyle ? currentStyle.fontName : '';
            const fontSize = currentStyle ? currentStyle.fontSize : editor.style.fontSize;

            // 1. Create and insert the symbol span
            const symbolSpan = document.createElement('span');
            if (fontName && fontName !== 'Default') {
                symbolSpan.style.fontFamily = `'${fontName.replace(/'/g, "\\'")}'`;
            }
            symbolSpan.style.fontSize = fontSize;
            symbolSpan.innerText = symbol;

            range.deleteContents();
            range.insertNode(symbolSpan);

            // 2. Move cursor after the symbol
            range.setStartAfter(symbolSpan);
            range.collapse(true);

            // 3. Insert a "reset" span with original font and a zero-width space
            // This prevents the symbol's font from "bleeding" into new text
            const resetSpan = document.createElement('span');
            if (originalFont) {
                resetSpan.style.fontFamily = `'${originalFont.replace(/'/g, "\\'")}'`;
            }
            resetSpan.style.fontSize = fontSize;
            resetSpan.innerHTML = '&#8203;'; // Zero-width space

            range.insertNode(resetSpan);

            // 4. Position the cursor exactly inside the reset span after the ZWSP
            // so the user continues typing in the original style.
            range.setStart(resetSpan.firstChild, 1);
            range.collapse(true);
            selection.removeAllRanges();
            selection.addRange(range);

            editor.focus();
            if (selection.rangeCount > 0) {
                savedRange = selection.getRangeAt(0).cloneRange();
            }
        }

        // --- Current Style Detection ---
        let lastReportedFont = '';
        let lastReportedSize = '';

        function getCurrentStyle() {
            const selection = window.getSelection();
            if (!selection.rangeCount) return null;

            let element = selection.anchorNode;
            if (element && element.nodeType === Node.TEXT_NODE) {
                element = element.parentNode;
            }

            if (element && element.nodeType === Node.ELEMENT_NODE && editor.contains(element)) {
                const style = window.getComputedStyle(element);
                const fontName = style.fontFamily.replace(/['"]/g, '').split(',')[0];
                const fontSize = style.fontSize;

                if (window.Android && typeof window.Android.updateCurrentStyle === 'function') {
                    if (fontName !== lastReportedFont || fontSize !== lastReportedSize) {
                        window.Android.updateCurrentStyle(fontName, fontSize);
                        lastReportedFont = fontName;
                        lastReportedSize = fontSize;
                    }
                }
                return { fontName, fontSize };
            }
            return null;
        }

        function preparePrint() {
            window.tempOriginalHtml = editor.innerHTML;
            
            function isNodeEmpty(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    return node.textContent.trim() === '';
                }
                if (node.nodeType === Node.ELEMENT_NODE) {
                    const tag = node.nodeName.toUpperCase();
                    if (tag === 'IMG' || tag === 'TABLE' || tag === 'HR' || tag === 'IFRAME') {
                        return false;
                    }
                    if (tag === 'BR') return true;
                    for (let i = 0; i < node.childNodes.length; i++) {
                        if (!isNodeEmpty(node.childNodes[i])) return false;
                    }
                    return true;
                }
                return true;
            }

            while (editor.lastChild && isNodeEmpty(editor.lastChild)) {
                editor.removeChild(editor.lastChild);
            }
        }

        function restorePrint() {
            if (window.tempOriginalHtml !== undefined) {
                editor.innerHTML = window.tempOriginalHtml;
                delete window.tempOriginalHtml;
            }
        }

        editor.addEventListener('click', getCurrentStyle);
        editor.addEventListener('keyup', getCurrentStyle);
        editor.addEventListener('mouseup', getCurrentStyle);

        window.onload = () => {
            editor.focus();
            getCurrentStyle();
        };
    </script>
</body>

</html>
